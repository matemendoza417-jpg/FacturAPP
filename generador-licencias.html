<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Licencias — FacturAPP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0A0A0B; color: #D1D5DB; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: #1C1C1F; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 36px; max-width: 440px; width: 100%; }
    h1 { font-size: 22px; color: #fff; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #6B6B76; margin-bottom: 24px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #9CA3AF; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 12px 14px; background: #0A0A0B; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 15px; margin-bottom: 16px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #8B0000; }
    input::placeholder { color: #3A3A40; }
    button { width: 100%; padding: 14px; background: #8B0000; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #A50000; }
    .result { margin-top: 20px; background: #0A0A0B; border: 1px solid rgba(139,0,0,0.3); border-radius: 12px; padding: 20px; display: none; }
    .result.show { display: block; }
    .result-label { font-size: 11px; color: #6B6B76; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .result-key { font-size: 26px; font-weight: 800; color: #E8837A; letter-spacing: 2px; font-family: monospace; margin-bottom: 12px; word-break: break-all; }
    .result-email { font-size: 13px; color: #9CA3AF; }
    .copy-btn { margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.06); color: #D1D5DB; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .history { margin-top: 24px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 16px; }
    .history h3 { font-size: 13px; color: #6B6B76; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
    .history-item .key { color: #E8837A; font-family: monospace; font-weight: 600; }
    .history-item .email { color: #9CA3AF; }
    .history-item .copy-hist { background: none; border: none; color: #6B6B76; cursor: pointer; font-size: 12px; padding: 4px 8px; }
    .history-item .copy-hist:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔑 Generador de Licencias</h1>
    <p class="sub">Generá claves de activación para tus clientes</p>
    
    <label>Email del cliente</label>
    <input type="email" id="email" placeholder="cliente@email.com" autofocus>
    
    <button onclick="generar()">Generar clave</button>
    
    <div class="result" id="result">
      <div class="result-label">Clave de activación</div>
      <div class="result-key" id="key"></div>
      <div class="result-email" id="emailResult"></div>
      <button class="copy-btn" onclick="copiar()">Copiar clave</button>
    </div>
    
    <div class="history" id="history"></div>
  </div>

  <script>
    const LICENSE_SALT = 'FacturAPP-2026';

    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash).toString(36).toUpperCase().padStart(6, '0');
    }

    function generateKey(email) {
      const normalized = email.trim().toLowerCase();
      const hash1 = simpleHash(normalized + LICENSE_SALT);
      const hash2 = simpleHash(LICENSE_SALT + normalized + hash1);
      const part1 = hash1.substring(0, 4);
      const part2 = hash2.substring(0, 4);
      const part3 = simpleHash(normalized + hash2).substring(0, 4);
      return `FA-${part1}-${part2}-${part3}`;
    }

    function generar() {
      const email = document.getElementById('email').value.trim();
      if (!email) return;
      
      const key = generateKey(email);
      document.getElementById('key').textContent = key;
      document.getElementById('emailResult').textContent = email;
      document.getElementById('result').classList.add('show');
      
      // Save to history
      let history = JSON.parse(localStorage.getItem('license_history') || '[]');
      history.unshift({ email, key, date: new Date().toLocaleDateString('es-AR') });
      if (history.length > 50) history = history.slice(0, 50);
      localStorage.setItem('license_history', JSON.stringify(history));
      renderHistory();
    }

    function copiar() {
      const key = document.getElementById('key').textContent;
      navigator.clipboard.writeText(key);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ Copiado';
      setTimeout(() => btn.textContent = 'Copiar clave', 2000);
    }

    function copiarHist(key) {
      navigator.clipboard.writeText(key);
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('license_history') || '[]');
      const container = document.getElementById('history');
      if (history.length === 0) { container.innerHTML = ''; return; }
      
      let html = '<h3>Licencias generadas</h3>';
      history.forEach(h => {
        html += `<div class="history-item">
          <span class="email">${h.email}</span>
          <span class="key">${h.key}</span>
          <button class="copy-hist" onclick="copiarHist('${h.key}')">📋</button>
        </div>`;
      });
      container.innerHTML = html;
    }

    document.getElementById('email').addEventListener('keypress', e => {
      if (e.key === 'Enter') generar();
    });

    renderHistory();
  </script>
</body>
</html>
