<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B0000"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#shine)"/>

  <!-- Document shape -->
  <rect x="148" y="108" width="192" height="248" rx="14" fill="rgba(255,255,255,0.12)"/>
  <rect x="148" y="108" width="192" height="248" rx="14" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" fill="none"/>

  <!-- Folded corner -->
  <path d="M292 108 L340 156 L292 156 Z" fill="rgba(0,0,0,0.2)"/>
  <path d="M292 108 L340 156" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Lines on document -->
  <rect x="172" y="185" width="96" height="7" rx="3.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="172" y="207" width="128" height="5" rx="2.5" fill="rgba(255,255,255,0.35)"/>
  <rect x="172" y="222" width="112" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="172" y="237" width="120" height="5" rx="2.5" fill="rgba(255,255,255,0.25)"/>

  <!-- Separator line -->
  <rect x="172" y="260" width="152" height="1.5" rx="1" fill="rgba(255,255,255,0.2)"/>

  <!-- Total highlight row -->
  <rect x="172" y="272" width="152" height="28" rx="6" fill="rgba(255,255,255,0.15)"/>
  <rect x="182" y="281" width="56" height="10" rx="3" fill="rgba(255,255,255,0.8)"/>
  <rect x="274" y="281" width="40" height="10" rx="3" fill="rgba(255,255,255,0.9)"/>

  <!-- Euro symbol accent -->
  <circle cx="362" cy="356" r="58" fill="rgba(255,255,255,0.1)"/>
  <circle cx="362" cy="356" r="44" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
  <text x="362" y="371" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="700" fill="white" opacity="0.95">€</text>
</svg>
