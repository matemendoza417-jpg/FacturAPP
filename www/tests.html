<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>FacturAPP — Tests</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 20px auto; padding: 20px; }
    .pass { color: #2E7D32; }
    .fail { color: #C62828; font-weight: bold; }
    .test { padding: 4px 0; border-bottom: 1px solid #eee; }
    h1 { font-size: 18px; }
    h2 { font-size: 14px; color: #555; margin-top: 20px; }
    #summary { padding: 10px; margin-top: 20px; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>
  <h1>FacturAPP — Unit Tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <script src="js/config.js"></script>
  <script src="js/retencion.js"></script>
  <script src="js/storage.js"></script>
  <script>
    // ── Test Framework Simple ────────────────────────────────
    var _tests = [];
    var _pass = 0, _fail = 0;

    function describe(name, fn) {
      var section = document.createElement('h2');
      section.textContent = name;
      document.getElementById('results').appendChild(section);
      fn();
    }

    function it(name, fn) {
      try {
        fn();
        _pass++;
        _addResult(name, true);
      } catch (e) {
        _fail++;
        _addResult(name + ' → ' + e.message, false);
      }
    }

    function expect(val) {
      return {
        toBe: function(expected) {
          if (val !== expected) throw new Error('Expected ' + expected + ', got ' + val);
        },
        toEqual: function(expected) {
          if (JSON.stringify(val) !== JSON.stringify(expected))
            throw new Error('Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(val));
        },
        toBeTruthy: function() {
          if (!val) throw new Error('Expected truthy, got ' + val);
        },
        toBeFalsy: function() {
          if (val) throw new Error('Expected falsy, got ' + val);
        },
        toBeGreaterThan: function(n) {
          if (!(val > n)) throw new Error('Expected ' + val + ' > ' + n);
        },
        toContain: function(item) {
          if (!val.includes(item)) throw new Error('Expected array to contain ' + item);
        }
      };
    }

    function _addResult(name, pass) {
      var div = document.createElement('div');
      div.className = 'test ' + (pass ? 'pass' : 'fail');
      div.textContent = (pass ? '✓' : '✗') + ' ' + name;
      document.getElementById('results').appendChild(div);
    }

    function _showSummary() {
      var el = document.getElementById('summary');
      el.textContent = _pass + ' passed, ' + _fail + ' failed — ' +
        (_fail === 0 ? 'ALL TESTS PASSED ✓' : 'SOME TESTS FAILED ✗');
      el.style.background = _fail === 0 ? '#E8F5E9' : '#FFEBEE';
      el.style.color = _fail === 0 ? '#2E7D32' : '#C62828';
    }

    // ══════════════════════════════════════════════════════════
    //  TESTS: retencion.js
    // ══════════════════════════════════════════════════════════

    describe('Retenciones — Mauro', function () {
      it('Mauro sin retención: showInPdf=true, applyToTotal=false', function () {
        var r = calcularModeloRetencion({ alias: 'Mauro' }, false, 19);
        expect(r.showInPdf).toBe(true);
        expect(r.applyToTotal).toBe(false);
        expect(r.rate).toBe(19);
      });

      it('Mauro con retención: showInPdf=true, applyToTotal=true', function () {
        var r = calcularModeloRetencion({ alias: 'Mauro' }, true, 19);
        expect(r.showInPdf).toBe(true);
        expect(r.applyToTotal).toBe(true);
      });
    });

    describe('Retenciones — Lorena', function () {
      it('Lorena sin retención: showInPdf=false, applyToTotal=false', function () {
        var r = calcularModeloRetencion({ alias: 'Lorena' }, false, 19);
        expect(r.showInPdf).toBe(false);
        expect(r.applyToTotal).toBe(false);
      });

      it('Lorena con retención: showInPdf=true, applyToTotal=true', function () {
        var r = calcularModeloRetencion({ alias: 'Lorena' }, true, 19);
        expect(r.showInPdf).toBe(true);
        expect(r.applyToTotal).toBe(true);
      });
    });

    describe('Retenciones — Genérico', function () {
      it('Otro emisor sin retención: todo false', function () {
        var r = calcularModeloRetencion({ alias: 'Pedro' }, false, 19);
        expect(r.showInPdf).toBe(false);
        expect(r.applyToTotal).toBe(false);
      });

      it('Otro emisor con retención: todo true', function () {
        var r = calcularModeloRetencion({ alias: 'Pedro' }, true, 21);
        expect(r.showInPdf).toBe(true);
        expect(r.applyToTotal).toBe(true);
        expect(r.rate).toBe(21);
      });

      it('Emisor sin alias se trata como genérico', function () {
        var r = calcularModeloRetencion({}, false, 19);
        expect(r.showInPdf).toBe(false);
        expect(r.applyToTotal).toBe(false);
      });
    });

    describe('Cálculo importe retención', function () {
      it('applyToTotal=false → 0', function () {
        var m = { rate: 19, applyToTotal: false };
        expect(calcularImporteRetencion(m, 1000)).toBe(0);
      });

      it('19% de 1000 = 190', function () {
        var m = { rate: 19, applyToTotal: true };
        expect(calcularImporteRetencion(m, 1000)).toBe(190);
      });

      it('21% de 500 = 105', function () {
        var m = { rate: 21, applyToTotal: true };
        expect(calcularImporteRetencion(m, 500)).toBe(105);
      });

      it('Redondeo correcto: 33.33% de 100 = 33.33', function () {
        var m = { rate: 33.33, applyToTotal: true };
        expect(calcularImporteRetencion(m, 100)).toBe(33.33);
      });
    });

    describe('textoRetencionPDF', function () {
      it('Genera texto correcto', function () {
        expect(textoRetencionPDF({ rate: 19 })).toBe('-RET (19%)');
        expect(textoRetencionPDF({ rate: 21 })).toBe('-RET (21%)');
      });
    });

    // ══════════════════════════════════════════════════════════
    //  TESTS: config.js
    // ══════════════════════════════════════════════════════════

    describe('Config', function () {
      it('FacturAPPConfig existe', function () {
        expect(typeof FacturAPPConfig).toBe('object');
      });

      it('TG_BOT_TOKEN se decodifica correctamente', function () {
        var token = FacturAPPConfig.TG_BOT_TOKEN;
        expect(typeof token).toBe('string');
        expect(token.length).toBeGreaterThan(10);
        expect(token).toContain(':');
      });

      it('Config tiene valores por defecto', function () {
        expect(FacturAPPConfig.DEFAULT_IVA_PCT).toBe(21);
        expect(FacturAPPConfig.DEFAULT_RETENCION_PCT).toBe(19);
        expect(FacturAPPConfig.SCHEMA_VERSION).toBeGreaterThan(0);
      });
    });

    // ══════════════════════════════════════════════════════════
    //  TESTS: storage.js (backup/checksum)
    // ══════════════════════════════════════════════════════════

    describe('Storage — Checksum', function () {
      it('_simpleChecksum genera string', function () {
        var result = _simpleChecksum('test data');
        expect(typeof result).toBe('string');
        expect(result.length).toBeGreaterThan(0);
      });

      it('_simpleChecksum es determinista', function () {
        var a = _simpleChecksum('hello world');
        var b = _simpleChecksum('hello world');
        expect(a).toBe(b);
      });

      it('_simpleChecksum cambia con input diferente', function () {
        var a = _simpleChecksum('hello');
        var b = _simpleChecksum('world');
        if (a === b) throw new Error('Checksums should differ');
      });
    });

    describe('Storage — Save/Load', function () {
      it('_save retorna true en caso de éxito', function () {
        var result = _save('test_key_123', { test: true });
        expect(result).toBe(true);
      });

      it('_load retorna datos guardados', function () {
        _save('test_key_456', [1, 2, 3]);
        var data = _load('test_key_456');
        expect(data).toEqual([1, 2, 3]);
      });

      it('_load retorna [] si no existe la clave', function () {
        var data = _load('nonexistent_key_xyz');
        expect(data).toEqual([]);
      });

      it('_load retorna [] si JSON está corrupto', function () {
        localStorage.setItem('test_corrupt', '{invalid json');
        var data = _load('test_corrupt');
        expect(data).toEqual([]);
      });

      // Cleanup
      localStorage.removeItem('test_key_123');
      localStorage.removeItem('test_key_456');
      localStorage.removeItem('test_corrupt');
    });

    describe('Storage — Emisores predefinidos', function () {
      it('getEmisores incluye Mauro y Lorena', function () {
        var emisores = getEmisores();
        var names = emisores.map(function(e) { return e.alias; });
        expect(names).toContain('Mauro');
        expect(names).toContain('Lorena');
      });

      it('getClientes incluye Iván', function () {
        var clientes = getClientes();
        var names = clientes.map(function(c) { return c.alias; });
        expect(names).toContain('Iván');
      });
    });

    // ── Run all ─────────────────────────────────────────────
    _showSummary();
  </script>
</body>
</html>
